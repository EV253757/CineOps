services:
  cineops-api:
    build: ./apps/api
    image: cineops-api:local
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_PATH: /data/cineops.db
      MEDIA_ROOTS: /media/peliculas-e;/media/peliculas-f;/media/peliculas-h
      CORS_ORIGINS: http://localhost:5173,https://victorious-glacier-048221c0f.7.azurestaticapps.net
      JELLYFIN_URL: http://jellyfin:8096
      JELLYFIN_PUBLIC_URL: https://desktop-rl4mpvq.tail0584f0.ts.net:8443
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY}
      AUTH_SIGNING_SECRET: ${AUTH_SIGNING_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_STORAGE_CONTAINER: movies
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/data
      - ${MEDIA_E_PATH}:/media/peliculas-e:ro
      - ${MEDIA_F_PATH}:/media/peliculas-f:ro
      - ${MEDIA_H_PATH}:/media/peliculas-h:ro
    depends_on:
      jellyfin:
        condition: service_healthy

  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      - ${MEDIA_E_PATH}:/media/peliculas-e:ro
      - ${MEDIA_F_PATH}:/media/peliculas-f:ro
      - ${MEDIA_H_PATH}:/media/peliculas-h:ro
